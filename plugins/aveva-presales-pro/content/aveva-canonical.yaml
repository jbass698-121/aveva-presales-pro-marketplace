# =========================================================================
# Corporate context — establishes the framing every battlecard depends on
# =========================================================================
corporate:
  aveva_status:
    structure: "wholly-owned subsidiary of Schneider Electric"
    acquisition_completed: "2023-01-18"
    valuation_at_close: "GBP 9.5B / approximately USD 10.8B"
    delisted_from: "London Stock Exchange (LSE)"
    operating_autonomy: "preserved per acquisition terms; AVEVA brand and product line maintained"
    canonical_phrasing:
      strong: "AVEVA, part of Schneider Electric"
      strongest: "AVEVA, a Schneider Electric company"
      weak_avoid: "AVEVA + Schneider partnership"     # avoid this — they're not partners, they're one company
    sources:
      - url: "https://www.aveva.com/en/about/news/press-releases/2023/aveva-announces-the-completion-of-its-acquisition-by-schneider-electric/"
        last_verified: "2026-04-29"
      - url: "https://www.se.com/ww/en/about-us/investor-relations/aveva-offer/"
        last_verified: "2026-04-29"

# =========================================================================
# AVEVA core software products
# =========================================================================
products:

  operations_control:
    canonical_name: "AVEVA Operations Control"
    short_form: "AOC"
    description: "Unified subscription model that bundles AVEVA's HMI/SCADA portfolio under three packages."
    packages:
      edge:
        canonical_name: "AVEVA Operations Control — Edge"
        bundles:
          - "AVEVA Edge"
          - "AVEVA InTouch HMI"
        target_use: "plant-floor and field-level visualization, edge-of-network deployments"
        licensing: "subscription"
      supervisory:
        canonical_name: "AVEVA Operations Control — Supervisory"
        bundles:
          - "AVEVA Plant SCADA"
          - "AVEVA System Platform"
        target_use: "control rooms, supervisory operations, multi-station HMI"
        licensing: "subscription"
      enterprise:
        canonical_name: "AVEVA Operations Control — Enterprise"
        bundles:
          - "AVEVA System Platform (full)"
          - "AVEVA Unified Operations Center capability"
        target_use: "enterprise / corporate-team aggregation across sites"
        licensing: "subscription"
    legacy_aliases:
      # Names the plugin's earlier content used that are NOT current canonical SKUs:
      - alias: "Operations Control Edge Starter"
        canonical_now: "AVEVA Operations Control — Edge"
        action: "replace in all content; remove 'Starter' qualifier"
      - alias: "Operations Control Site Editions"
        canonical_now: "AVEVA Operations Control — Supervisory"
        action: "replace in all content"
      - alias: "Operations Control Site Edition"
        canonical_now: "AVEVA Operations Control — Supervisory"
        action: "replace in all content"
    sources:
      - url: "https://www.aveva.com/en/products/aveva-operations-control/"
        last_verified: "2026-04-29"
      - url: "https://www.aveva.com/en/solutions/operations/operations-control-hmi/"
        last_verified: "2026-04-29"

  pi_system:
    canonical_name: "AVEVA PI System"
    short_form: "PI System"
    legacy_brand: "OSIsoft PI"
    description: "Industrial historian and data infrastructure. Real-time and historical operations data with the Asset Framework model."
    deployment_paths:
      on_prem:
        primary_visualization: "AVEVA PI Vision"
        canonical_phrasing: "AVEVA PI System with PI Vision"
      cloud:
        primary_visualization: "CONNECT Visualization"
        delivered_via: "AVEVA CONNECT data services"
        canonical_phrasing: "AVEVA PI Data Infrastructure with CONNECT Visualization"
      hybrid:
        canonical_phrasing: "AVEVA PI System with hybrid CONNECT data services"
    capabilities:
      - "real-time time-series ingestion (millions of tags per server)"
      - "Asset Framework — hierarchical model for physical and process assets"
      - "Event Frames — structured downtime / batch event capture"
      - "PI Notifications — rule-based alerting"
      - "PI Web API — REST access for integrations"
      - "PI System Connectors / Interfaces — broad industrial protocol coverage"
    sources:
      - url: "https://www.aveva.com/en/products/aveva-pi-system/"
        last_verified: "2026-04-29"
      - url: "https://www.aveva.com/en/products/pi-data-infrastructure/"
        last_verified: "2026-04-29"

  pi_vision:
    canonical_name: "AVEVA PI Vision"
    description: "Web-based visualization for on-prem PI System. Operations dashboards, trends, asset displays."
    deployment: "on-prem"
    cloud_successor: "CONNECT Visualization (different product, complementary)"
    sources:
      - url: "https://www.aveva.com/en/products/aveva-pi-vision/"
        last_verified: "2026-04-29"

  connect:
    canonical_name: "AVEVA CONNECT"
    description: "AVEVA's industrial intelligence cloud platform. Combines on-prem systems with cloud flexibility for data management, modeling, AI, analytics, visualization."
    components:
      - name: "CONNECT data services"
        description: "Cloud-native time-series and asset-model data fabric. Successor positioning to AVEVA Data Hub."
      - name: "CONNECT Visualization"
        description: "Composable browser-based dashboards. Real-time data from CONNECT data services + multiple data types and formats including third-party."
        formerly_alternative: "PI Vision (on-prem); IOTA VUE (third-party SaaS option starting Oct 2025)"
      - name: "Industrial AI Assistant"
        description: "Generative-AI conversational assistant embedded in CONNECT. See ai_capabilities below."
    sources:
      - url: "https://www.aveva.com/en/products/connect/"
        last_verified: "2026-04-29"
      - url: "https://docs.aveva.com/bundle/connect-visualization/page/1388805.html"
        last_verified: "2026-04-29"

  industrial_ai_assistant:
    canonical_name: "AVEVA Industrial AI Assistant"
    short_form: "Industrial AI Assistant"
    status: "GA"
    ga_date: "2026-01"
    availability: "available to all users of CONNECT visualization"
    capabilities:
      - "Natural-language query across industrial data sources"
      - "Retrieval of process values, summaries, dashboards, trends, documents"
      - "Role-based permission awareness"
      - "Secure data access — never trained on customer data"
      - "Minimal pre-configuration; processes data already in CONNECT"
    related_AI_products:
      - name: "Generative Design AI Assistant"
        scope: "Unified Engineering"
        capability: "Layout option generation under user-specified constraints"
        ga_date: "2026-01"
      - name: "Predictive Design AI Assistant"
        scope: "Unified Engineering"
        capability: "Customer-trained ML models without coding"
        ga_date: "2026-01"
      - name: "Intelligent Point Cloud Framework"
        scope: "AVEVA Point Cloud Manager"
        capability: "Auto-import and AI-classification of point cloud data"
        ga_date: "2026-01"
    confidence: "HIGH (officially announced and GA)"
    freshness_note: "Capability set is current as of 2026-04. AVEVA is actively expanding; refresh monthly via source-validation task."
    sources:
      - url: "https://www.aveva.com/en/connect-experience/about-connect/industrial-ai-assistant/"
        last_verified: "2026-04-29"
      - url: "https://www.aveva.com/en/about/news/press-releases/2026/aveva-unveils-new-artificial-intelligence-offering-across-its-unified-engineering-solution/"
        last_verified: "2026-04-29"

  system_platform:
    canonical_name: "AVEVA System Platform"
    short_form: "System Platform"
    description: "Object-oriented supervisory platform. Multi-vendor SCADA aggregation, alarming, recipe management, and the engineering-to-operations layer above PLC/DCS."
    current_release_family: "2023 R2 series with continuous updates"
    multi_vendor_protocols:
      - "OPC-UA"
      - "Ethernet/IP (Allen-Bradley)"
      - "Modbus / Modbus TCP"
      - "SIMATIC drivers (Siemens)"
      - "DNP3 (water/utilities)"
      - "MQTT / Sparkplug B"
      - "ControlNet, DH+ (legacy AB)"
    note: "Bundled inside AVEVA Operations Control — Supervisory and Enterprise packages."
    sources:
      - url: "https://docs.aveva.com/bundle/sp-install/"
        last_verified: "2026-04-29"

  intouch_hmi:
    canonical_name: "AVEVA InTouch HMI"
    short_form: "InTouch"
    description: "Single-machine and small-system HMI. The most widely deployed HMI globally."
    current_release: "InTouch 2023 R2 (and continuous-update successors)"
    licensing_models:
      - "perpetual (InTouch Unlimited remains available)"
      - "subscription via Operations Control — Edge"
    note: "InTouch Unlimited is unlimited-tag perpetual. The 'Unlimited' qualifier is the right counter to Ignition's unlimited-tag pitch."
    sources:
      - url: "https://docs.aveva.com/bundle/intouch-hmi/"
        last_verified: "2026-04-29"

  unified_operations_center:
    canonical_name: "AVEVA Unified Operations Center"
    short_form: "UOC"
    description: "Multi-site enterprise orchestration. Aggregates plants, sites, and KPIs into one operations view."
    target_use: "Enterprise tier — distributors, multinationals, multi-site operators"
    note: "Bundled inside AVEVA Operations Control — Enterprise."
    sources:
      - url: "https://docs.aveva.com/bundle/unified-operations/"
        last_verified: "2026-04-29"

  mes:
    canonical_name: "AVEVA Manufacturing Execution System"
    short_form: "MES"
    description: "IDC MarketScape Leader-rated MES. Batch + recipe + electronic batch records + OEE + production scheduling."
    regulatory_alignment:
      - "FDA 21 CFR Part 11 ready out of the box"
      - "FSMA 204 Critical Tracking Events supported via batch records"
      - "GFSI alignment (SQF, BRC, FSSC 22000) audit support"
    sources:
      - url: "https://docs.aveva.com/bundle/mes/"
        last_verified: "2026-04-29"

  flex:
    canonical_name: "AVEVA Flex"
    description: "Subscription commercial model. Credits-based access to the AVEVA portfolio. Distinct from Operations Control (which is itself subscription, but a packaged offering); Flex is the broader credits framework."
    note: "Existing flex-subscription.md content is roughly current; verify partner-portal terms before quoting."

# =========================================================================
# Schneider Electric pillars (the unified portfolio narrative)
# =========================================================================
partner_pillars:

  etap:
    canonical_name: "ETAP"
    legal_name: "ETAP — A Schneider Electric Company"
    description: "Electrical power systems digital twin. Load flow, short-circuit, motor starting, protection coordination, arc-flash, real-time monitoring."
    aveva_integration: "ETAP Integration Service — round-trip with AVEVA System Platform via standard protocols"
    sources:
      - url: "https://etap.com/"
        last_verified: "2026-04-29"

  ecostruxure_automation_expert:
    canonical_name: "EcoStruxure Automation Expert"
    short_form: "EAE"
    description: "Software-defined automation per IEC 61499. Hardware-independent process control, vendor-agnostic execution layer."
    aveva_integration: "EAE function-block status consumed by AVEVA System Platform's Operations Management Interface"
    sources:
      - url: "https://www.se.com/ww/en/product-category/4100-distributed-control-systems-dcs"
        last_verified: "2026-04-29"

  power_monitoring_expert:
    canonical_name: "EcoStruxure Power Monitoring Expert"
    short_form: "PME"
    description: "Power-quality and energy management at building and plant level. Scope 2 reporting, power-quality root-cause analysis."
    aveva_integration: "Standard protocols (Modbus, OPC-UA) into AVEVA System Platform graphics; energy KPIs surfaced in PI Asset Framework templates"
    sources:
      - url: "https://www.se.com/ww/en/product-range/61175-ecostruxure-power-monitoring-expert/"
        last_verified: "2026-04-29"

