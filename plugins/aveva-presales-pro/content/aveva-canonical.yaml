        last_verified: "2026-04-29"

# =========================================================================
# Security and compliance certifications
# =========================================================================
security:
  enterprise_certifications:
    - name: "ISO 27001"
      scope: "AVEVA-wide"
      since: "long-standing; current as of 2026"
    - name: "SOC 2 Type II"
      scope: "AVEVA-wide; CONNECT cloud services"
      since: "long-standing; current as of 2026"
    - name: "IEC 62443 / ISA 99"
      scope: "Product cybersecurity (System Platform, InTouch, PI System, Operations Control)"
      since: "2019"
    - name: "ISASecure SDLA"
      scope: "Secure development lifecycle assurance"
      since: "long-standing"
  cloud_infrastructure:
    azure: "ISO 27001 / 27017 / 27018; AICPA SOC 2"
    aws: "ISO 27001 / 27017 / 27018; AICPA SOC 2"
  competitive_use:
    - "Counter to Honeywell secure-by-design / Quantinuum framing — AVEVA holds the ISA/IEC 62443 cert that's the OT-cybersecurity floor"
    - "Counter to Ignition support / cybersecurity comparison — list certs by name with date verified"
    - "Critical for CISA / EPA AWIA / TSA Pipeline directive conversations"
  sources:
    - url: "https://www.aveva.com/en/legal/trust/security/"
      last_verified: "2026-04-29"
    - url: "https://www.aveva.com/content/dam/aveva/documents/onesheet/OneSheet-Standards-and-certifications-for-operations-control.pdf"
      last_verified: "2026-04-29"

# =========================================================================
# Phrasing canonical — used by the Schneider-parent reframe in battlecards
# =========================================================================
phrasing:
  schneider_parent_strong: "AVEVA, part of Schneider Electric, delivers ..."
  unified_portfolio_intro: "AVEVA, part of Schneider Electric, brings the only unified portfolio of process automation (AVEVA), electrical digital twin (ETAP), software-defined automation (EAE), and power monitoring (PME) under one commercial relationship."
  ai_assistant_one_liner: "AVEVA Industrial AI Assistant is GA in CONNECT (January 2026): natural-language querying across industrial data, role-based permissions, never trained on customer data."
  databricks_one_liner: "AVEVA Manufacturing ISV Partner of the Year 2025 with Databricks. CONNECT and Databricks share data via Delta Sharing — open standard, no ETL."
  pi_system_dual_track: "On-prem: AVEVA PI System with PI Vision. Cloud: AVEVA PI Data Infrastructure with CONNECT Visualization."
  forbidden_phrases:
    - phrase: "AVEVA + Schneider partnership"
      reason: "AVEVA IS Schneider; they're not partners. Use 'AVEVA, part of Schneider Electric'."
    - phrase: "Operations Control Edge Starter"
      reason: "Not a current SKU. Use 'AVEVA Operations Control — Edge'."
    - phrase: "Operations Control Site Edition"
      reason: "Not a current SKU. Use 'AVEVA Operations Control — Supervisory'."

# =========================================================================
# Refresh policy
# =========================================================================
refresh:
  monthly_check: "source-validation scheduled task hits the URLs above and flags any 404 / structural change"
  triggers_audit_pass:
    - "any product canonical_name change"
    - "any package set change"
    - "Industrial AI Assistant capability change > 1 line"
    - "new security certification added or expired"
  next_review: "2026-05-29"
