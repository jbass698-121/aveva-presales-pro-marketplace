# =========================================================================
# Water and Wastewater
# =========================================================================
water_wastewater:

  lcri:
    canonical_name: "Lead and Copper Rule Improvements"
    short_form: "LCRI"
    formerly: "Lead and Copper Rule Revisions (LCRR)"
    plugin_legacy_term: "LCRR"
    final_rule_date: "2024-10-08"
    federal_register_publication: "2024-10-30"
    effective_date: "2024-12-30"
    compliance_date: "2027-11-01"
    interim_period_obligations:
      - "Initial Lead Service Line Inventory (LSLI) — Oct 16, 2024 (LCRR-era requirement maintained)"
      - "Public notification of known/potential lead service lines — LCRR-era requirement maintained"
      - "Tier 1 public notification for lead action level exceedance — maintained"
    headline_requirements:
      - "10-year mandatory replacement of all lead service lines (with limited exceptions)"
      - "Lower lead action level: 10 µg/L (down from 15 µg/L under LCRR)"
      - "Mandatory baseline service-line inventory by 2027-11-01 covering all lines regardless of ownership or use"
      - "Publicly accessible replacement plan; systems serving >50,000 must publish online and update annually"
      - "More rigorous water testing requirements"
    presales_implication:
      seller_question: "Where are you on LCRI's 10-year service-line replacement timeline, and what's your service-line communication strategy?"
      avoid_question: "Have you completed your LCRR inventory?"   # LCRR is superseded
      sales_hook: "LCRI compliance by 2027-11-01 is the primary modernization driver in US municipal water through 2027. AVEVA Operations Control + asset management directly addresses inventory tracking, public-facing portals, and audit-ready documentation."
    sources:
      - url: "https://www.epa.gov/ground-water-and-drinking-water/lead-and-copper-rule-improvements"
        type: "regulatory_primary"
        last_verified: "2026-04-29"
      - url: "https://www.federalregister.gov/documents/2024/10/30/2024-23549/national-primary-drinking-water-regulations-for-lead-and-copper-improvements-lcri"
        type: "federal_register"
        last_verified: "2026-04-29"

  awia:
    canonical_name: "America's Water Infrastructure Act"
    short_form: "AWIA"
    section_in_play: "Section 2013 — Risk and Resilience Assessments + Emergency Response Plans"
    presales_implication:
      sales_hook: "AWIA risk and resilience assessments + Emergency Response Plans are recurring (every 5 years for community water systems > 3,300 population). AVEVA Operations Control + cybersecurity certification posture supports these."
    sources:
      - url: "https://www.epa.gov/waterresilience/awia-section-2013"
        last_verified: "2026-04-29"

  cisa_cybersecurity:
    canonical_name: "CISA / EPA cybersecurity expectations for water utilities"
    related: ["CIRCIA — Cyber Incident Reporting for Critical Infrastructure Act", "EPA 2023 Cybersecurity guidance"]
    presales_implication: "Water utility IT/OT directors are under sustained federal pressure on OT cybersecurity. AVEVA's ISA/IEC 62443 + ISO 27001 + SOC 2 Type II posture is the right counter to community-supported alternatives like Ignition."
    sources:
      - url: "https://www.cisa.gov/topics/critical-infrastructure-security-and-resilience/critical-infrastructure-sectors/water-and-wastewater-systems-sector"
        last_verified: "2026-04-29"

# =========================================================================
# CPG / Food and Beverage
# =========================================================================
cpg:

  fsma_204:
    canonical_name: "FSMA Section 204 — Food Traceability Rule"
    short_form: "FSMA 204"
    formal_title: "Requirements for Additional Traceability Records for Certain Foods"
    original_compliance_date: "2026-01-20"
    extended_compliance_date: "2028-07-20"
    extension_basis: "Continuing Appropriations Act (2026) Congressional directive — FDA shall not enforce prior to 2028-07-20"
    extension_source: "FDA proposal (Aug 2025); Congressional directive in subsequent appropriations act"
    fda_enforcement_stance: "FDA intends to comply with Congressional directive; effectively non-enforcement until 2028-07-20"
    plugin_legacy_term: "FSMA 204 effective Jan 2026"   # the plugin currently treats as in-force; needs two-track update
    headline_requirements:
      - "Critical Tracking Events (CTEs) for foods on the Food Traceability List (FTL)"
      - "Key Data Elements (KDEs) captured at each CTE"
      - "Records retained for 2 years"
      - "Electronic sortable spreadsheet within 24 hours of FDA request"
    food_traceability_list_categories:
      - "Cheeses, soft and semi-soft (other than processed cheese)"
      - "Eggs (shell)"
      - "Nut butters"
      - "Cucumbers, fresh herbs, leafy greens, melons, peppers, sprouts, tomatoes, tropical fruits"
      - "Fish (finfish, smoked, fresh, frozen)"
      - "Crustaceans, molluscan shellfish"
      - "Ready-to-eat deli salads"
    presales_implication:
      two_track_framing:
        track_a_compliant: "Customer's compliance program is on track. AVEVA accelerates audit-prep, KDE capture automation, and FTL-tagged batch records."
        track_b_using_extension: "Customer is using the FDA extension to 2028-07-20. AVEVA delivers a phased path: KDE capture readiness by year 1, integrated CTE traceability by year 2."
      seller_question: "Are you running your FSMA 204 program on the original 2026 timeline or under the extension to July 2028? What's your current state on Critical Tracking Event capture?"
      avoid_framing: "FSMA 204 is effective January 2026"   # technically true but ignores the non-enforcement reality
    sources:
      - url: "https://www.fda.gov/food/food-safety-modernization-act-fsma/fsma-final-rule-requirements-additional-traceability-records-certain-foods"
        type: "regulatory_primary"
        last_verified: "2026-04-29"
      - url: "https://www.federalregister.gov/documents/2025/08/07/2025-14967/requirements-for-additional-traceability-records-for-certain-foods-compliance-date-extension"
        type: "federal_register"
        last_verified: "2026-04-29"

  fda_part_11:
    canonical_name: "FDA 21 CFR Part 11 — Electronic Records and Electronic Signatures"
    presales_implication: "AVEVA MES is Part 11 ready out of the box. Distributor implementation team validates per customer."
    sources:
      - url: "https://www.fda.gov/regulatory-information/search-fda-guidance-documents/part-11-electronic-records-electronic-signatures-scope-and-application"
        last_verified: "2026-04-29"

  fda_part_117:
    canonical_name: "FDA 21 CFR Part 117 — Current Good Manufacturing Practice, Hazard Analysis, and Risk-Based Preventive Controls for Human Food"
    presales_implication: "AVEVA System Platform + PI System support process control, CCP monitoring, and records natively."

# =========================================================================
# Oil and Gas
# =========================================================================
oil_gas:

  phmsa_gas_mega_rule:
    canonical_name: "PHMSA Gas Pipeline Safety Mega Rule"
    short_form: "Gas Mega Rule"
    plugin_legacy_term: "PHMSA 49 CFR 192"
    structure: "Three-phase rulemaking"
    phases:
      rin1:
        canonical_name: "Mega Rule Part 1 (RIN1)"
        scope: "Material verification, assessment expansion, recordkeeping for onshore gas transmission"
        effective_date: "2020-07-01"
      rin2:
        canonical_name: "Mega Rule Part 2 (RIN2)"
        scope: "Integrity management improvements, repair criteria, corrosion control, management of change"
        effective_date: "2023-05-24"
        compliance_milestone: "Initial compliance elements due 2024-02-26"
        federal_register: "87 FR 52224 (Aug 2022 publish)"
      rin3:
        canonical_name: "Mega Rule Part 3 (RIN3) — Onshore Gathering Lines"
        scope: "Expanded PHMSA jurisdiction over onshore gathering lines"
        effective_date: "2023-05-16"
    presales_implication:
      sales_hook: "Mega Rule Part 2 (effective May 2023) and Part 3 (effective May 2023) are driving SCADA-modernization conversations across midstream right now. Compliance reporting automation, integrity management workflows, and pipeline asset records are the AVEVA opportunity."
      seller_question: "How does your team handle Mega Rule Part 2 integrity management reporting? What's the data architecture between SCADA, integrity management, and the records system?"
    sources:
      - url: "https://www.federalregister.gov/documents/2022/08/24/2022-17031/pipeline-safety-safety-of-gas-transmission-pipelines-repair-criteria-integrity-management"
        type: "federal_register"
        last_verified: "2026-04-29"
      - url: "https://www.phmsa.dot.gov/news/phmsa-publishes-final-rule-strengthening-pipeline-safety-and-environmental-protection"
        type: "regulatory_primary"
        last_verified: "2026-04-29"

  phmsa_liquid:
    canonical_name: "PHMSA 49 CFR 195 — Hazardous Liquid Pipeline Safety"
    presales_implication: "Liquid pipeline integrity, leak detection, and custody-transfer reconciliation. AVEVA System Platform + PI System are widely deployed."
    sources:
      - url: "https://www.phmsa.dot.gov/regulations/title49/part/195"
        last_verified: "2026-04-29"

  oooo_b_c:
    canonical_name: "EPA NSPS Subpart OOOOb / OOOOc — Oil and Gas Methane Standards"
    short_form: "OOOOb / OOOOc"
    plugin_legacy_term: "OOOOa / OOOOb"   # previous text bundled them; OOOOb/c is the current pair
    final_rule_publication: "2024-03-08"
    overview:
      ooo_b: "New Source Performance Standards (NSPS) for new, reconstructed, and modified oil and gas sources"
      ooo_c: "Emission Guidelines (EG) — states develop plans for existing sources"
    deadline_status_2026:
      - "2025-07-28: EPA extended several compliance deadlines (interim final rule)"
      - "2025-11-26: Final rule adopted IFR-extended deadlines"
      - "First annual report under Subpart OOOOb due no earlier than 2026-11-30"
      - "State plan submission deadline: 2027-01-22"
      - "2026-04-04: EPA finalized reconsideration on two specific aspects"
    presales_implication:
      sales_hook: "OOOOb/c monitoring requirements are driving fugitive-emissions data architecture conversations in upstream and midstream. AVEVA PI System + System Platform aggregate continuous monitoring data into auditable records."
      seller_question: "How are you tracking methane emissions for OOOOb reporting? Annual report under OOOOb is due no earlier than November 2026 — what's your data plan?"
      avoid_framing: "OOOOb is in force as originally scheduled"   # extensions matter
    sources:
      - url: "https://www.epa.gov/controlling-air-pollution-oil-and-natural-gas-operations/epas-final-rule-reduce-methane-and-other"
        type: "regulatory_primary"
        last_verified: "2026-04-29"
      - url: "https://www.epa.gov/controlling-air-pollution-oil-and-natural-gas-operations/2025-interim-final-rule-extend-compliance"
        type: "regulatory_primary"
        last_verified: "2026-04-29"

  api_recommended_practices:
    canonical_names:
      - "API 510 — Pressure Vessel Inspection Code"
      - "API 570 — Piping Inspection Code"
      - "API 653 — Tank Inspection, Repair, Alteration, and Reconstruction"
      - "API 1149 — Pipeline Variable Uncertainties"
    presales_implication: "AVEVA Asset Information Management (AIM) + PI Asset Framework inspection templates align with these RPs."

  bsee_boem_offshore:
    canonical_names:
      - "BSEE — Bureau of Safety and Environmental Enforcement (operations)"
      - "BOEM — Bureau of Ocean Energy Management (leasing)"
    presales_implication: "Offshore Gulf of Mexico operators. Yokogawa CENTUM is often the SCADA/DCS incumbent; AVEVA's PI System depth is the wedge."

